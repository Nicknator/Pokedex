<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pokedex</title>

</head>

<body onload="init()">

        <div class="header-inner">

    <footer class="footer">

    </footer>
