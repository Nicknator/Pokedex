<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <link id="favicon" rel="icon" type="image/png" href="img/pokedexLogo.png">
    <link rel="stylesheet" href="style.css">
    <title>Pokedex</title>
</head>

<body onload="init()">
    <header class="header">
        <div class="header-inner">
            <img src="img/pokeballLogo.png" alt="Pokedexlogo" class="header-img">
            <input id="searchInput" type="text" placeholder="Search..." oninput="searchPokemon(this.value)"
                class="search-container">
        </div>
    </header>



    <div class="container">
        <div class="h1-Field">
            <h1>Pokedex</h1>
        </div>

        <div class="content-wrapper">
            <main id="content" class="contentSet"></main>
        </div>

        <button onclick="fetchNewPokemon(); loadMorePokemon(this) " class="loadNewPokedex"> Load new Pokemons</button>
        <div id="loadingSpinner" style="display:none;"></div>
        <div id="pokedex">
            <!-- Bereits vorhandene Pokémon hier -->
        </div>
    </div>

    <footer class="footer">
        <div class="footer-inner">
            <p>2026 Pokedex</p>
            <p>Imprint</p>
            <p>Cookie Preferences</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="template.js"></script>

</body>

</html>
